<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Nguyễn Minh Tấn - Link in Bio Profile">
    <title>Nguyễn Minh Tấn | Link in Bio</title>
    
    <!-- Google Fonts - Dongle -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dongle:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Animated Liquid Background -->
    <div class="liquid-background">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
        <div class="gradient-orb orb-4"></div>
    </div>

    <!-- Main Container -->
    <main class="container">
        
        <!-- Profile Header Section -->
        <header class="profile-header glass-card" data-tilt>
            <div class="avatar-wrapper">
                <img src="images/avatar.jpg" alt="Nguyễn Minh Tấn Avatar" class="avatar">
            </div>
            <div class="profile-info">
                <h1 class="profile-name">Nguyễn Minh Tấn</h1>
                <p class="profile-bio">Creative Designer & Content Creator </p>
            </div>
        </header>

        <!-- Social Links Section -->
        <section class="social-links">
            
            <!-- TikTok Link -->
            <a href="https://www.tiktok.com/@tantaphuongnoi?_r=1&_t=ZS-96H7UPESZ2j" class="link-button glass-card" data-tilt target="_blank" rel="noopener noreferrer">
                <div class="link-icon">
                    <img src="images/tiktok.svg" alt="TikTok Icon">
                </div>
                <span class="link-text">TikTok</span>
                <div class="link-arrow">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </a>

            <!-- Facebook Link -->
            <a href="https://www.facebook.com/share/1CtK7tZLqS/?mibextid=wwXIfr" class="link-button glass-card" data-tilt target="_blank" rel="noopener noreferrer">
                <div class="link-icon">
                    <img src="images/facebook.svg" alt="Facebook Icon">
                </div>
                <span class="link-text">Facebook</span>
                <div class="link-arrow">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </a>

            <!-- Discord Link -->
            <a href="https://discord.gg/fVfbZjmsVH" class="link-button glass-card" data-tilt target="_blank" rel="noopener noreferrer">
                <div class="link-icon">
                    <img src="images/discord.svg" alt="Discord Icon">
                </div>
                <span class="link-text">Discord</span>
                <div class="link-arrow">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </a>

            <!-- Zypage Link -->
            <a href="https://zypage.com/tan17" class="link-button glass-card" data-tilt target="_blank" rel="noopener noreferrer">
                <div class="link-icon">
                    <img src="images/Zypage.svg" alt="Zypage Icon">
                </div>
                <span class="link-text">Zypage</span>
                <div class="link-arrow">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </a>

        </section>

        <!-- Donate Section / Footer -->
        <footer class="donate-section glass-card" data-tilt>
            <h2 class="donate-title">Support / Donate cho mình nhé</h2>
            <div class="qr-wrapper">
                <img src="images/QR.jpg" alt="QR Code for Donation" class="qr-code">
            </div>
        </footer>

    </main>

    <!-- Main JavaScript -->
    <script src="js/main.js"></script>
</body>
</html>
